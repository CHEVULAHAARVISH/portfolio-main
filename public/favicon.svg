<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#080808"/>
  <!-- Three-domain triangle mark -->
  <polygon points="16,8 26,24 6,24"
           fill="none"
           stroke="#F5F0E8"
           stroke-width="1.4"
           stroke-linejoin="round"/>
  <!-- Flagship vertex (top) — orange -->
  <circle cx="16" cy="8" r="3" fill="#E16349"/>
  <!-- Bottom-left vertex -->
  <circle cx="6" cy="24" r="1.6" fill="#F5F0E8"/>
  <!-- Bottom-right vertex -->
  <circle cx="26" cy="24" r="1.6" fill="#F5F0E8"/>
</svg>
